name: Temporary Whereami Yandex Match Sheet

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/whereami-reverse-master.yml'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reverse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: whereami-reverse-search
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pillow opencv-python-headless numpy
      - run: python whereami-reverse-search/yandex_exact.py
      - run: python whereami-reverse-search/yandex_compare.py
      - name: Commit match sheet
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A whereami-reverse-search
          git commit -m 'Update Yandex ranked visual matches' || exit 0
          git push origin HEAD:whereami-reverse-search
