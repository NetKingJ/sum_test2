name: Temporary Whereami Reverse Search

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/whereami-reverse-master.yml'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reverse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: whereami-reverse-search
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python whereami-reverse-search/reverse.py
      - run: python whereami-reverse-search/lens_render.py
      - run: python whereami-reverse-search/other_engines.py
      - run: python whereami-reverse-search/compact_summary.py
      - name: Commit results to branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf whereami-reverse-search/chrome-profile-* whereami-reverse-search/other-profile-* || true
          git add -A whereami-reverse-search
          git commit -m 'Update compact reverse image search results' || exit 0
          git push origin HEAD:whereami-reverse-search
