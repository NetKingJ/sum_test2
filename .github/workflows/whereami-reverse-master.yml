name: Temporary Whereami Exact Reverse Search

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/whereami-reverse-master.yml'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reverse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: whereami-reverse-search
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pillow
      - name: Verify exact challenge image
        run: |
          cp whereami-reverse-search/whereami-original.jpg whereami-reverse-search/whereami-small.jpg
          python - <<'PY'
          from PIL import Image
          p='whereami-reverse-search/whereami-small.jpg'
          im=Image.open(p)
          im.verify()
          print('verified', Image.open(p).size)
          PY
      - run: python whereami-reverse-search/reverse.py
      - name: Commit exact reverse results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A whereami-reverse-search
          git commit -m 'Update exact reverse-image engine results' || exit 0
          git push origin HEAD:whereami-reverse-search
