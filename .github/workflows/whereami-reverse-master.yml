name: Temporary Whereami Reverse Search

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/whereami-reverse-master.yml'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reverse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: whereami-reverse-search
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 pillow opencv-python-headless numpy
      - name: Harvest candidates and capture diagnostics
        run: |
          set +e
          python whereami-reverse-search/harvest_compare.py > whereami-reverse-search/harvest-run.log 2>&1
          code=$?
          echo "$code" > whereami-reverse-search/harvest-exit-code.txt
          cat whereami-reverse-search/harvest-run.log
          exit 0
      - name: Commit diagnostics and results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A whereami-reverse-search
          git commit -m 'Capture harvested candidate diagnostics' || exit 0
          git push origin HEAD:whereami-reverse-search
